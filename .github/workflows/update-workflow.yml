name: Update go-workflows

on:
  workflow_call:
    secrets:
      TOKEN_ACCESS:
        required: true
        description: Token with permissions to push branches and open PRs

jobs:
  update-workflows:
    runs-on: [ubuntu-latest]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pre-requisites
        run: |
          sudo apt update
          sudo apt install -y git jq

      - name: Get latest workflow tag
        id: latest-tag
        env:
          GH_TOKEN: ${{ secrets.TOKEN_ACCESS }}
        run: |
          LATEST_TAG=$(gh api repos/Open-CMSIS-Pack/workflows-and-actions-collection/releases/latest --jq .tag_name)
          echo "Latest workflow version is $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Update workflow references
        run: |
          for workflow in .github/workflows/*; do
            sed -i "s|Open-CMSIS-Pack/workflows-and-actions-collection/.github/workflows/\([^@]*\)@.*|Open-CMSIS-Pack/workflows-and-actions-collection/.github/workflows/\1@${{ steps.latest-tag.outputs.latest_tag }}|" "$workflow"
          done

      - name: Check for changes
        id: check-changes
        continue-on-error: true
        run: git diff --exit-code || echo "changes-found=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check-changes.outputs.changes-found == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.TOKEN_ACCESS }}
          commit-message: "Update go-workflows to ${{ steps.latest-tag.outputs.latest_tag }}"
          branch: update-go-workflow-${{ github.run_id }}
          delete-branch: true
          title: "🤖 Update go-workflows to ${{ steps.latest-tag.outputs.latest_tag }}"
          body: |
            Updates all common workflows references to the latest version.
